# docker-compose.dev.yml
# Standalone development stack — runs on its own, no base-file merge and no .env required:
#   docker compose -f docker-compose.dev.yml up
# Same services + per-service env scope as docker-compose.yml, tuned for dev:
# builder image target, source bind-mounts, hot-reload, Vite dev server, and Mailpit for email.
services:
  https-proxy:
    image: nginx:alpine
    ports:
      - "3080:80"
      - "3443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./ops/https/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - manifold-certs:/etc/nginx/certs
    command: >-
      /bin/sh -c '
      if [ ! -f /etc/nginx/certs/manifold.crt ] || [ ! -f /etc/nginx/certs/manifold.key ]; then
      apk add --no-cache openssl >/dev/null 2>&1 &&
      openssl req -x509 -nodes -newkey rsa:2048 -days 365 -keyout /etc/nginx/certs/manifold.key -out /etc/nginx/certs/manifold.crt -subj "/CN=localhost";
      fi &&
      nginx -g "daemon off;"'
    restart: unless-stopped

  # Vite dev server. VITE_API_BASE_URL is also a build arg (parity with prod); the dev server
  # reads all three from the runtime environment below.
  frontend:
    build:
      context: ./frontend
      target: builder
      args:
        # Keep empty — api client endpoints already carry the /api/v1 prefix.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET:-http://backend:8000}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-localhost}
    depends_on:
      - backend
    restart: unless-stopped

  # Alembic migrations — only needs the database connection string.
  migrate:
    build:
      context: ./backend
      target: builder
    command: ["uv", "run", "alembic", "upgrade", "head"]
    # No env_file: each service is scoped to exactly the vars below. Values still come from
    # an optional ./.env (or shell) via ${VAR:-default} interpolation.
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/manifold.db}
    volumes:
      - ./backend:/app
      - venv-data:/app/.venv
      - manifold-data:/app/data
    depends_on:
      manifold-redis:
        condition: service_healthy
    restart: "no"

  # API process — app/auth/db/redis, job schedules (settings API), TrueLayer, notifier creds.
  backend:
    build:
      context: ./backend
      target: builder
    command: uv run uvicorn manifold.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    # No env_file: each service is scoped to exactly the vars below. Values still come from
    # an optional ./.env (or shell) via ${VAR:-default} interpolation.
    environment:
      # ── Application ──
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-change-me-0000000000000000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # ── Bootstrap + auth ──
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # ── Database ──
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/manifold.db}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-3}
      - DB_POOL_MAX_OVERFLOW=${DB_POOL_MAX_OVERFLOW:-2}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-30}
      # ── Redis / Taskiq (API enqueues jobs) ──
      - REDIS_URL=${REDIS_URL:-redis://manifold-redis:6379/0}
      - TASKIQ_RESULT_TTL=${TASKIQ_RESULT_TTL:-3600}
      # ── Job schedules (read-only, shown in the settings API) ──
      - SYNC_CRON=${SYNC_CRON:-*/5 * * * *}
      - ALARM_EVAL_CRON=${ALARM_EVAL_CRON:-*/5 * * * *}
      - RECURRENCE_DETECT_CRON=${RECURRENCE_DETECT_CRON:-0 3 * * *}
      - CLEANUP_CRON=${CLEANUP_CRON:-0 4 * * *}
      # ── TrueLayer provider ──
      - TRUELAYER_CLIENT_ID=${TRUELAYER_CLIENT_ID:-}
      - TRUELAYER_CLIENT_SECRET=${TRUELAYER_CLIENT_SECRET:-}
      - TRUELAYER_REDIRECT_URI=${TRUELAYER_REDIRECT_URI:-https://localhost:3443/api/v1/providers/truelayer/callback}
      - TRUELAYER_SANDBOX=${TRUELAYER_SANDBOX:-true}
      # ── Notifications (global SMTP fallback creds + system channel id) ──
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SYSTEM_NOTIFIER_ID=${SYSTEM_NOTIFIER_ID:-}
    volumes:
      - ./backend:/app
      - venv-data:/app/.venv
      - manifold-data:/app/data
    depends_on:
      manifold-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Worker + scheduler — runs sync/alarm/recurrence/cleanup jobs and sends notifications.
  manifold-tasker:
    build:
      context: ./backend
      target: builder
    # NOTE: no --reload on the worker. The SQLite DB lives under /app/data (inside the
    # bind-mounted source tree), so watchfiles sees every DB write and restarts the worker
    # in a tight loop — killing in-flight tasks. Restart the container to pick up task code.
    command: >
      sh -c "uv run taskiq worker manifold.tasks.broker:broker manifold.tasks &
               uv run taskiq scheduler manifold.tasks.scheduler:scheduler &
               wait"
    # No env_file: each service is scoped to exactly the vars below. Values still come from
    # an optional ./.env (or shell) via ${VAR:-default} interpolation.
    environment:
      # ── Core ──
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-change-me-0000000000000000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # ── Database ──
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/manifold.db}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-3}
      - DB_POOL_MAX_OVERFLOW=${DB_POOL_MAX_OVERFLOW:-2}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-30}
      # ── Redis / Taskiq ──
      - REDIS_URL=${REDIS_URL:-redis://manifold-redis:6379/0}
      - TASKIQ_RESULT_TTL=${TASKIQ_RESULT_TTL:-3600}
      # ── Job schedules (scheduler) ──
      - SYNC_CRON=${SYNC_CRON:-*/5 * * * *}
      - ALARM_EVAL_CRON=${ALARM_EVAL_CRON:-*/5 * * * *}
      - RECURRENCE_DETECT_CRON=${RECURRENCE_DETECT_CRON:-0 3 * * *}
      - CLEANUP_CRON=${CLEANUP_CRON:-0 4 * * *}
      # ── Data retention (cleanup job) ──
      - SYNC_RUN_RETENTION_DAYS=${SYNC_RUN_RETENTION_DAYS:-90}
      - NOTIFICATION_DELIVERY_RETENTION_DAYS=${NOTIFICATION_DELIVERY_RETENTION_DAYS:-90}
      - ALARM_EVALUATION_RETENTION_DAYS=${ALARM_EVALUATION_RETENTION_DAYS:-30}
      - EVENT_RETENTION_DAYS=${EVENT_RETENTION_DAYS:-365}
      # ── TrueLayer provider (sync) ──
      - TRUELAYER_CLIENT_ID=${TRUELAYER_CLIENT_ID:-}
      - TRUELAYER_CLIENT_SECRET=${TRUELAYER_CLIENT_SECRET:-}
      - TRUELAYER_REDIRECT_URI=${TRUELAYER_REDIRECT_URI:-https://localhost:3443/api/v1/providers/truelayer/callback}
      - TRUELAYER_SANDBOX=${TRUELAYER_SANDBOX:-true}
      # ── Notifications (global SMTP fallback creds + system channel id) ──
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SYSTEM_NOTIFIER_ID=${SYSTEM_NOTIFIER_ID:-}
    volumes:
      - ./backend:/app
      - venv-data:/app/.venv
      - manifold-data:/app/data
    depends_on:
      manifold-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  manifold-redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Dev-only: local SMTP sink. Point an Email notifier at host "mailpit" port 1025 (TLS off);
  # view captured mail at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  venv-data:
  manifold-data:
  manifold-certs:
