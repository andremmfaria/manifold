# docker-compose.yml
services:
  https-proxy:
    image: nginx:alpine
    profiles: ["https"]
    ports:
      - "3443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./ops/https/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - manifold-certs:/etc/nginx/certs
    command: >-
      /bin/sh -c '
      if [ ! -f /etc/nginx/certs/manifold.crt ] || [ ! -f /etc/nginx/certs/manifold.key ]; then
        apk add --no-cache openssl >/dev/null 2>&1 &&
        openssl req -x509 -nodes -newkey rsa:2048 -days 365
          -keyout /etc/nginx/certs/manifold.key
          -out /etc/nginx/certs/manifold.crt
          -subj "/CN=localhost";
      fi &&
      nginx -g "daemon off;"'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - manifold-data:/app/data
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://manifold-redis:6379/0
    depends_on:
      manifold-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - manifold-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  manifold-tasker:
    build:
      context: ./backend
    command: ["supervisord", "-c", "/app/supervisord.conf"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://manifold-redis:6379/0
    depends_on:
      manifold-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - manifold-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  manifold-redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  manifold-data:
  manifold-certs:
