# Dev HTTPS reverse proxy.
# Upstreams differ from prod: the frontend is the Vite dev server on :5173 (not nginx:80),
# and Vite needs websocket upgrade headers for HMR (hot module reload) to work through the proxy.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirect all plaintext HTTP to HTTPS (published on host port 3443).
server {
    listen 80;
    server_name localhost;
    return 301 https://$host:3443$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/manifold.crt;
    ssl_certificate_key /etc/nginx/certs/manifold.key;

    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Vite HMR websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
